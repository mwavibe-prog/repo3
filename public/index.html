<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Crew Overboard!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a1628;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas {
      display: block;
      border: 2px solid #2a4a7f;
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(42, 74, 127, 0.5);
    }
    #waiting-screen {
      position: fixed;
      inset: 0;
      background: #0a1628;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      color: #e0e8f0;
    }
    #waiting-screen h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      color: #4a9eff;
      text-shadow: 0 0 20px rgba(74, 158, 255, 0.5);
    }
    #waiting-screen .subtitle {
      font-size: 1.1rem;
      color: #8899aa;
      margin-bottom: 2rem;
    }
    #waiting-screen .status {
      font-size: 1.3rem;
      margin-bottom: 1.5rem;
    }
    .dot-anim::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }
    #qr-container {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin: 1rem 0;
    }
    #qr-container canvas { border: none; box-shadow: none; }
    .player-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }
    .p1-badge { background: #22668a; color: #8ad4ff; }
    .p2-badge { background: #8a2222; color: #ff8a8a; }
    .url-display {
      font-size: 0.85rem;
      color: #667;
      margin-top: 0.5rem;
      word-break: break-all;
      max-width: 300px;
      text-align: center;
    }
    #touch-controls {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 50;
      pointer-events: none;
    }
    #touch-controls button {
      pointer-events: auto;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    #touch-controls button:active {
      background: rgba(255,255,255,0.3);
      border-color: rgba(255,255,255,0.6);
    }
    #full-screen { display: none; }
    @media (max-width: 500px) {
      #touch-controls { display: flex; }
    }
  </style>
</head>
<body>

<div id="waiting-screen">
  <h1>Crew Overboard!</h1>
  <div class="subtitle">Multiplayer Boat Survival</div>
  <div id="player-badge" class="player-badge">Connecting...</div>
  <div id="status" class="status dot-anim">Connecting to server</div>
  <div id="qr-section" style="display:none; text-align:center;">
    <p style="color:#8899aa; margin-bottom:0.5rem;">Player 2: scan QR code or share this link</p>
    <div id="qr-container"><img id="qr-img" alt="QR Code" width="250" height="250" /></div>
    <div id="p2-url" class="url-display" style="
      background: rgba(255,255,255,0.1);
      padding: 10px 16px;
      border-radius: 8px;
      color: #4a9eff;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 0.75rem;
    " onclick="navigator.clipboard.writeText(this.textContent).then(()=>{this.style.color='#44ff44';this.dataset.orig=this.textContent;this.textContent='Copied!';setTimeout(()=>{this.textContent=this.dataset.orig;this.style.color='#4a9eff'},1500)})"></div>
    <p style="color:#556; font-size:0.75rem; margin-top:0.4rem;">Tap link to copy</p>
  </div>
  <div id="full-screen">
    <p style="color:#aaa; font-size:0.9rem;">Game server is full.</p>
  </div>
</div>

<canvas id="game-canvas" width="400" height="700"></canvas>

<div id="touch-controls">
  <button id="btn-left" aria-label="Move left">&#9664;</button>
  <button id="btn-right" aria-label="Move right">&#9654;</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>
</body>
</html>
